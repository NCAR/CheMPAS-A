version: "1.0.0"
name: Chapman-NOx
# Chapman cycle + NOx catalytic O3 destruction (stratospheric subset).
# Seven species, six reactions (three Chapman photolysis, three thermal,
# plus NO+O3 titration, NO2+O recombination, NO2 photolysis).
# Rate-constant names match TUV-x's tuvx_chapman_nox.json exactly.
species:
  - name: M
    is third body: true
  - name: O2
    __tracer type: CONSTANT
    __molar mass: 0.032
    __long name: molecular_oxygen
    __do advect: true
    __initial concentration: 0.0
  - name: O
    __absolute tolerance: 1e-12
    __molar mass: 0.016
    __long name: atomic_oxygen_3P
    __do advect: true
    __initial concentration: 0.0
  - name: O1D
    __absolute tolerance: 1e-12
    __molar mass: 0.016
    __long name: atomic_oxygen_1D
    __do advect: true
    __initial concentration: 0.0
  - name: O3
    __absolute tolerance: 1e-12
    __molar mass: 0.048
    __long name: ozone
    __atoms: 3
    __do advect: true
    __initial concentration: 0.0
  - name: NO
    __absolute tolerance: 1e-12
    __molar mass: 0.030
    __long name: nitric_oxide
    __do advect: true
    __initial concentration: 0.0
  - name: NO2
    __absolute tolerance: 1e-12
    __molar mass: 0.046
    __long name: nitrogen_dioxide
    __do advect: true
    __initial concentration: 0.0

phases:
  - name: gas
    species:
      - M
      - O
      - O2
      - O3
      - O1D
      - NO
      - NO2

reactions:
  # ----- Chapman cycle -----
  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: O2
    products:
      - species name: O
        coefficient: 2.0
    name: jO2

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O
        coefficient: 1
      - species name: O2
        coefficient: 1
    products:
      - species name: O3
        coefficient: 1
    A: 8.018e-17
    name: R2

  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: O3
    products:
      - species name: O
        coefficient: 1
      - species name: O2
        coefficient: 1
    name: jO3_O

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O
        coefficient: 1
      - species name: O3
        coefficient: 1
    products:
      - species name: O2
        coefficient: 2.0
    A: 1.576e-15
    name: R4

  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: O3
    products:
      - species name: O1D
        coefficient: 1
      - species name: O2
        coefficient: 1
    name: jO3_O1D

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O1D
        coefficient: 1
      - species name: M
        coefficient: 1
    products:
      - species name: O
        coefficient: 1
      - species name: M
        coefficient: 1
    A: 7.11e-11
    name: R6

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O1D
        coefficient: 1
      - species name: O3
        coefficient: 1
    products:
      - species name: O2
        coefficient: 2.0
    A: 1.2e-10
    name: R7

  # ----- NOx catalytic O3 destruction -----
  # NO + O3 -> NO2 + O2   (JPL: A=3.0e-12, E/R=1500; in MICM Arrhenius form
  # A*exp(-E/R/T) with A given in molec/cm^3 /s; use C = -1500 convention
  # consistent with lnox_o3.yaml's rate choice)
  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: NO
        coefficient: 1
      - species name: O3
        coefficient: 1
    products:
      - species name: NO2
        coefficient: 1
      - species name: O2
        coefficient: 1
    A: 1.084e6
    C: -1370.0
    name: R_NO_O3

  # NO2 + O -> NO + O2   (JPL: k = 5.1e-12 exp(+210/T))
  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: NO2
        coefficient: 1
      - species name: O
        coefficient: 1
    products:
      - species name: NO
        coefficient: 1
      - species name: O2
        coefficient: 1
    A: 5.1e-12
    C: 210.0
    name: R_NO2_O

  # NO2 + hv -> NO + O(3P)   (products differ from lnox_o3.yaml where O3
  # is produced directly; here O3 reforms via Chapman reaction R2.)
  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: NO2
        coefficient: 1
    products:
      - species name: NO
        coefficient: 1
      - species name: O
        coefficient: 1
    name: jNO2
