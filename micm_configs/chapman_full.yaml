version: "1.0.0"
name: Chapman
species:
  # MICM requires __molar mass and __initial concentration for every species;
  # the initial value is overwritten by MPAS state transfer every step, so we
  # set it to 0 here. Actual ICs live in the MPAS init file (kg/kg).
  - name: M
    is third body: true
  - name: O2
    __tracer type: CONSTANT
    __molar mass: 0.032
    __long name: molecular_oxygen
    __do advect: true
    __initial concentration: 0.0
  - name: O
    __absolute tolerance: 1e-12
    __molar mass: 0.016
    __long name: atomic_oxygen_3P
    __do advect: true
    __initial concentration: 0.0
  - name: O1D
    __absolute tolerance: 1e-12
    __molar mass: 0.016
    __long name: atomic_oxygen_1D
    __do advect: true
    __initial concentration: 0.0
  - name: O3
    __absolute tolerance: 1e-12
    __molar mass: 0.048
    __long name: ozone
    __atoms: 3
    __do advect: true
    __initial concentration: 0.0

phases:
  - name: gas
    species:
      - M
      - O
      - O2
      - O3
      - O1D

reactions:
  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: O2
    products:
      - species name: O
        coefficient: 2.0
    name: jO2

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O
        coefficient: 1
      - species name: O2
        coefficient: 1
    products:
      - species name: O3
        coefficient: 1
    A: 8.018e-17
    name: R2

  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: O3
    products:
      - species name: O
        coefficient: 1
      - species name: O2
        coefficient: 1
    name: jO3_O

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O
        coefficient: 1
      - species name: O3
        coefficient: 1
    products:
      - species name: O2
        coefficient: 2.0
    A: 1.576e-15
    name: R4

  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: O3
    products:
      - species name: O1D
        coefficient: 1
      - species name: O2
        coefficient: 1
    name: jO3_O1D

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O1D
        coefficient: 1
      - species name: M
        coefficient: 1
    products:
      - species name: O
        coefficient: 1
      - species name: M
        coefficient: 1
    A: 7.11e-11
    name: R6

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O1D
        coefficient: 1
      - species name: O3
        coefficient: 1
    products:
      - species name: O2
        coefficient: 2.0
    A: 1.2e-10
    name: R7
