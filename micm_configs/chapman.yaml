version: "1.0.0"
name: Chapman
species:
  - name: O2
    __tracer type: CONSTANT
    __long name: molecular_oxygen
    __atoms: 2
  - name: O
    __absolute tolerance: 1e-12
    __long name: atomic_oxygen
    __atoms: 1
    __do advect: true
  - name: O3
    molecular weight [kg mol-1]: 0.048
    __absolute tolerance: 1e-12
    __long name: ozone
    __atoms: 3
    __do advect: true

phases:
  - name: gas
    species:
      - O2
      - O
      - O3

reactions:
  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: O2
    products:
      - species name: O
        coefficient: 2
    name: oxygen_photolysis

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O
        coefficient: 1
      - species name: O2
        coefficient: 1
    products:
      - species name: O3
        coefficient: 1
    A: 1.0e-16
    name: ozone_creation

  - type: PHOTOLYSIS
    gas phase: gas
    reactants:
      - species name: O3
    products:
      - species name: O
        coefficient: 1
      - species name: O2
        coefficient: 1
    name: ozone_photolysis

  - type: ARRHENIUS
    gas phase: gas
    reactants:
      - species name: O
        coefficient: 1
      - species name: O3
        coefficient: 1
    products:
      - species name: O2
        coefficient: 2
    A: 1.5e-15
    name: ozone_destruction
